<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ounce Stock - Visor Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #ffcc00; }
        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background: #000; font-family: 'Montserrat', sans-serif; }

        #video-wrapper { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        video { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; transition: opacity 0.5s ease; opacity: 0; }
        video.active { opacity: 1; z-index: 2; }

        #overlay-text { 
            position: absolute; top: 0; left: 30%; width: 65%; height: 100%;
            display: flex; align-items: center; justify-content: center; z-index: 50; pointer-events: none;
        }

        .phrase { 
            /* Fonte diminuída conforme solicitado */
            font-size: clamp(2rem, 5vw, 4.5rem); 
            font-weight: 900; color: #fff;
            text-transform: uppercase; text-align: center; opacity: 0; 
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            line-height: 0.9; width: 100%;
            background: linear-gradient(180deg, #ffffff 30%, #999999 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 10px 20px rgba(0,0,0,0.8));
            transform: scale(0.8);
        }
        .phrase.visible { opacity: 1; transform: scale(1); }

        #controls {
            position: fixed; bottom: 30px; right: 30px; z-index: 100;
            display: flex; gap: 10px; background: rgba(0,0,0,0.7); 
            padding: 15px; border-radius: 20px; backdrop-filter: blur(10px);
        }

        button {
            padding: 12px 25px; background: transparent; color: white;
            border: 1px solid rgba(255,255,255,0.3); border-radius: 12px;
            cursor: pointer; font-weight: 900; transition: 0.3s;
        }
        button.active { border-color: var(--accent); color: var(--accent); background: rgba(255,204,0,0.1); }
    </style>
</head>
<body>

    <div id="video-wrapper">
        <video id="vid1" class="active" autoplay muted playsinline></video>
        <video id="vid2" autoplay muted playsinline></video>
    </div>

    <div id="overlay-text"><h1 id="text-target" class="phrase"></h1></div>

    <div id="controls">
        <button id="btn-leite" onclick="changeProduct('LEITE', this)">LEITE</button>
        <button id="btn-coca" class="active" onclick="changeProduct('COCA', this)">COCA-COLA</button>
        <button id="btn-guarana" onclick="changeProduct('GUARANA', this)">GUARANÁ</button>
    </div>

    <script>
        const assets = {
            LEITE: { file: 'leite.webm', id: 3, to: { COCA: 'tr_leitecoca.webm', GUARANA: 'tr_leiteguarana.webm' } },
            COCA: { file: 'coca.webm', id: 4, to: { GUARANA: 'tr_cocaguarana.webm', LEITE: 'tr_cocaleite.webm' } },
            GUARANA: { file: 'guarana.webm', id: 5, to: { COCA: 'tr_guaranacoca.webm', LEITE: 'tr_guaranaleite.webm' } }
        };

        let current = 'COCA';
        let phrasesPool = ["OUNCE STOCK"];
        let phraseIdx = 0;
        let isTransitioning = false;
        let textTriggered = false; // Garante que a frase apareça só uma vez por loop
        
        const v1 = document.getElementById('vid1'), v2 = document.getElementById('vid2');
        let activeVid = v1, idleVid = v2;
        const textElem = document.getElementById('text-target');

        function playVideo(src, isLoop, onEnd) {
            idleVid.src = src; 
            idleVid.loop = isLoop; 
            idleVid.load();
            textTriggered = false; // Reseta o gatilho de texto para o novo vídeo

            idleVid.onloadeddata = () => {
                idleVid.play();
                idleVid.classList.add('active'); 
                activeVid.classList.remove('active');
                let t = activeVid; activeVid = idleVid; idleVid = t;
                
                if (!isLoop) {
                    activeVid.onended = onEnd;
                    activeVid.ontimeupdate = null;
                } else {
                    // Lógica para mostrar frase antes de pausar
                    activeVid.ontimeupdate = () => {
                        const timeLeft = activeVid.duration - activeVid.currentTime;
                        
                        // Aparece a frase faltando 2.5 segundos para o fim
                        if (timeLeft <= 2.5 && !textTriggered && !isTransitioning) {
                            textTriggered = true;
                            updateText();
                        }

                        // Pausa no último frame
                        if (activeVid.currentTime >= activeVid.duration - 0.1) {
                            activeVid.pause();
                            activeVid.ontimeupdate = null;
                        }
                    };
                }
            };
        }

        async function fetchData(id) {
            try {
                const host = window.location.hostname;
                const apiUrl = host.includes('github.dev') 
                    ? `https://${host.replace('-5500', '-3001')}/api/frase/${id}`
                    : `http://localhost:3001/api/frase/${id}`;

                const res = await fetch(apiUrl);
                const data = await res.json();
                phrasesPool = data.frases || ["OUNCE STOCK"];
            } catch { phrasesPool = ["OUNCE STOCK"]; }
            phraseIdx = 0;
        }

        function updateText() {
            textElem.innerText = phrasesPool[phraseIdx];
            textElem.classList.add('visible');
            phraseIdx = (phraseIdx + 1) % phrasesPool.length;
        }

        function hideText() {
            textElem.classList.remove('visible');
        }

        function changeProduct(target, btn) {
            if(isTransitioning || current === target) return;
            
            isTransitioning = true;
            hideText(); // Remove a frase imediatamente na troca

            document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            playVideo(assets[current].to[target], false, () => {
                current = target;
                fetchData(assets[current].id);
                playVideo(assets[current].file, true);
                isTransitioning = false;
            });
        }

        window.onload = () => {
            fetchData(4);
            playVideo(assets.COCA.file, true);
        };
    </script>
</body>
</html>
