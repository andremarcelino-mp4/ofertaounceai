<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ounce Stock - Visor Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #ffcc00; --bg: #000; }
        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background: var(--bg); font-family: 'Montserrat', sans-serif; }

        /* Container de Vídeo */
        #video-wrapper { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        video { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; transition: opacity 0.5s ease-in-out; opacity: 0; }
        video.active { opacity: 1; z-index: 2; }

        /* Overlay de Texto Moderno */
        #overlay-text { 
            position: absolute; top: 0; left: 30%; width: 65%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            z-index: 50; pointer-events: none; padding: 20px;
        }

        .phrase { 
            font-size: clamp(3.5rem, 9vw, 8rem); font-weight: 900; 
            text-transform: uppercase; text-align: center; opacity: 0; 
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            line-height: 0.9; width: 100%;
            
            /* Efeito Suado/Metálico Moderno */
            color: #fff;
            background: linear-gradient(180deg, #ffffff00 35%);
            
            filter: drop-shadow(0px 10px 20px rgba(0,0,0,0.8));
        }
        .phrase.visible { opacity: 1; transform: scale(1.05); }

        /* Botões */
        #controls {
            position: fixed; bottom: 40px; right: 40px; z-index: 100;
            display: flex; gap: 15px; background: rgba(0,0,0,0.7); 
            padding: 20px; border-radius: 30px; backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.1);
        }

        button {
            padding: 15px 30px; background: transparent; color: white;
            border: 2px solid rgba(255,255,255,0.3); border-radius: 15px;
            cursor: pointer; font-weight: 900; font-size: 0.9rem; transition: 0.3s;
            letter-spacing: 1px;
        }
        button:hover { background: white; color: black; }
        button.active { border-color: var(--accent); color: var(--accent); background: rgba(255, 204, 0, 0.1); }
    </style>
</head>
<body>

    <div id="video-wrapper">
        <video id="vid1" class="active" autoplay muted playsinline></video>
        <video id="vid2" autoplay muted playsinline></video>
    </div>

    <div id="overlay-text"><h1 id="text-target" class="phrase">CARREGANDO...</h1></div>

    <div id="controls">
        <button id="btn-leite" onclick="changeProduct('LEITE', this)">LEITE</button>
        <button id="btn-coca" class="active" onclick="changeProduct('COCA', this)">COCA-COLA</button>
        <button id="btn-guarana" onclick="changeProduct('GUARANA', this)">GUARANÁ</button>
    </div>

    <script>
        const assets = {
            LEITE: { file: 'leite.webm', id: 3, to: { COCA: 'tr_leitecoca.webm', GUARANA: 'tr_leiteguarana.webm' } },
            COCA: { file: 'coca.webm', id: 4, to: { GUARANA: 'tr_cocaguara.webm', LEITE: 'tr_cocaleite.webm' } },
            GUARANA: { file: 'guarana.webm', id: 5, to: { COCA: 'tr_guaracoca.webm', LEITE: 'tr_guaranaleite.webm' } }
        };

        let current = 'COCA';
        let phrasesPool = ["OUNCE STOCK"];
        let phraseIdx = 0;
        let isTransitioning = false;

        const v1 = document.getElementById('vid1');
        const v2 = document.getElementById('vid2');
        let activeVid = v1, idleVid = v2;
        const textElem = document.getElementById('text-target');

        function playVideo(src, isLoop, onEndCallback) {
            idleVid.src = src;
            idleVid.loop = isLoop;
            idleVid.load();
            idleVid.onloadeddata = () => {
                idleVid.play();
                idleVid.classList.add('active');
                activeVid.classList.remove('active');
                
                let temp = activeVid;
                activeVid = idleVid;
                idleVid = temp;

                if (!isLoop) {
                    activeVid.onended = onEndCallback;
                } else {
                    // Se for o vídeo principal, pausar no último segundo
                    activeVid.ontimeupdate = () => {
                        if (activeVid.currentTime >= activeVid.duration - 0.1) {
                            activeVid.pause();
                            activeVid.ontimeupdate = null;
                        }
                    };
                }
            };
        }

        async function fetchData(id) {
            try {
                const host = window.location.hostname;
                const apiUrl = host.includes('github.dev') 
                    ? `https://${host.replace('-5500', '-3001')}/api/frases/${id}`
                    : `http://localhost:3001/api/frases/${id}`;

                const res = await fetch(apiUrl);
                const data = await res.json();
                phrasesPool = data.frases || ["OFERTA ESPECIAL"];
            } catch { phrasesPool = ["OUNCE STOCK", "PRODUTO EM OFERTA"]; }
            phraseIdx = 0; updateText();
        }

        function updateText() {
            textElem.classList.remove('visible');
            setTimeout(() => {
                textElem.innerText = phrasesPool[phraseIdx];
                textElem.classList.add('visible');
                phraseIdx = (phraseIdx + 1) % phrasesPool.length;
            }, 800);
        }

        function changeProduct(target, btn) {
            if(isTransitioning || current === target) return;
            isTransitioning = true;
            
            document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            const transitionFile = assets[current].to[target];
            
            // Toca a transição ANTES de mudar para o loop do próximo produto
            playVideo(transitionFile, false, () => {
                current = target;
                fetchData(assets[current].id);
                playVideo(assets[current].file, true); // O loop pausará no fim
                isTransitioning = false;
            });
        }

        window.onload = () => {
            playVideo(assets.COCA.file, true);
            fetchData(4);
            setInterval(() => { if(!isTransitioning) updateText(); }, 5000);
        };
    </script>
</body>
</html>
